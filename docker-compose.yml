version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: tts2mp3_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-audiobook_platform}
      MYSQL_USER: ${DB_USER:-tts2mp3}
      MYSQL_PASSWORD: ${DB_PASSWORD:-tts2mp3pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - tts2mp3_mysql_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  tts2mp3_mysql_data:
